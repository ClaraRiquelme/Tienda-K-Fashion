<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpop Fantasy</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header class="encabezado">
        <h1 class="titulo">Kpop Fantasy</h1>

        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="mujer.html">Mujer</a>
            <a href="hombre.html">Hombre</a>
            <a href="ofertas.html">Ofertas</a>
        </nav>
    </header>

    <main>
        <div class="carrito-main">
            <div class="carrito-container">
                <div class="carrito-item">
                    <div class="carrito-item-img">
                        <img src="fotosRopa/outfit1.jpg">
                    </div>
                    <div class="carrito-detalles">
                        <h2>Título</h2>
                        <h4>Precio</h4>
                        <h4>Cantidad</h4>
                        <div>
                            <button class="remove-button">Quitar</button>
                            <button class="purchase-button">Comprar</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="carrito-buttons">
                <button class="remove-all-button">Quitar todo</button>
                <button class="purchase-all-button">Comprar todo</button>
            </div>
        </div>
    </main>

<footer class="pie">

    <div class="footer-grid">

        <div class="footer-brand">
            <img src="fotosVarias/logo.png" alt="Logo">
            <h3>Kpop Fantasy</h3>
            <p>Moda inspirada en tendencias coreanas</p>
        </div>

        <div class="footer-col">
            <h4>Redes</h4>

            <div class="red-social">
                <img src="fotosVarias/instagram.png" alt="Instagram">
                <span>Instagram</span>
            </div>

            <div class="red-social">
                <img src="fotosVarias/facebook.png" alt="Facebook">
                <span>Facebook</span>
            </div>

            <div class="red-social">
                <img src="fotosVarias/whatsapp.png" alt="Whatsapp">
                <span>Whatsapp</span>
            </div>

        </div>

        <div class="footer-col">
            <h4>Contacto</h4>
            <p>contacto@kpopfantasy.cl</p>
        </div>

    </div>

    <p class="copyright">
        © 2026 Kpop Fantasy · Todos los derechos reservados
    </p>

</footer>
</body>
</html>
